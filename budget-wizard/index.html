<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACP Demo — Personal Budget Wizard</title>
<style>
  :root { --accent: #3fb950; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; display: flex; height: 100vh; }

  .form-panel { flex: 1; padding: 32px; overflow-y: auto; border-right: 1px solid #30363d; }
  .form-panel h1 { font-size: 20px; margin-bottom: 4px; color: var(--accent); }
  .form-panel p.sub { color: #8b949e; margin-bottom: 16px; font-size: 14px; }

  .screen-tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
  .screen-tabs button {
    padding: 6px 16px; border: 1px solid #30363d; border-radius: 6px 6px 0 0; background: #161b22;
    color: #8b949e; cursor: pointer; font-size: 13px; transition: all 0.2s;
  }
  .screen-tabs button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .screen { display: none; }
  .screen.active { display: block; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 4px; }
  .field label .req { color: #f85149; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 8px 12px; background: #161b22; border: 1px solid #30363d;
    border-radius: 6px; color: #e6edf3; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 60px; }
  .field.highlight input, .field.highlight select, .field.highlight textarea { border-color: #d29922; background: #1c1e08; }
  .field input[readonly], .field textarea[readonly] { background: #0d1117; color: #8b949e; cursor: default; }

  .field-group { margin-bottom: 8px; padding: 12px; background: #161b22; border-radius: 8px; border: 1px solid #21262d; }
  .field-group h3 { font-size: 13px; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

  .actions { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
  .actions button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: #30363d; color: #e6edf3; }

  .toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 200;
    animation: fadeIn 0.3s; display: none;
  }
  .toast.success { background: #238636; color: #fff; }
  .toast.error { background: #da3633; color: #fff; }
  .toast.info { background: #1f6feb; color: #fff; }
  .toast.warning { background: #d29922; color: #fff; }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
  @keyframes dots { 0%,20% { content: '.'; } 40% { content: '..'; } 60%,100% { content: '...'; } }
  .chat-status.thinking::after { content: ''; animation: dots 1.2s infinite steps(1); }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px;
    width: 480px; max-height: 80vh; overflow-y: auto;
  }
  .modal h2 { font-size: 16px; margin-bottom: 12px; color: var(--accent); }
  .modal .breakdown-content { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 16px; font-size: 14px; color: #e6edf3; margin-bottom: 12px; min-height: 100px; white-space: pre-wrap; }
  .modal .modal-close { padding: 6px 16px; background: #30363d; color: #e6edf3; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }

  .chat-panel { width: 380px; display: flex; flex-direction: column; }
  .chat-header { padding: 16px; border-bottom: 1px solid #30363d; font-weight: 600; font-size: 14px; }
  .chat-status { font-size: 12px; color: #8b949e; font-weight: 400; margin-left: 8px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 8px 12px; border-radius: 12px; max-width: 85%; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
  .msg.user { background: #1f6feb; align-self: flex-end; }
  .msg.agent { background: #21262d; align-self: flex-start; }
  .msg.system { background: transparent; color: #8b949e; font-size: 12px; align-self: center; font-style: italic; }
  .chat-input { display: flex; padding: 12px; border-top: 1px solid #30363d; gap: 8px; }
  .chat-input input {
    flex: 1; padding: 8px 12px; background: #161b22; border: 1px solid #30363d;
    border-radius: 6px; color: #e6edf3; font-size: 14px; outline: none;
  }
  .chat-input button { padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .chat-input input:disabled, .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div class="form-panel">
  <h1>Personal Budget Wizard</h1>
  <p class="sub">Take control of your finances with Penny, your AI budget advisor.</p>

  <nav class="screen-tabs">
    <button class="active" data-tab="income">Income</button>
    <button data-tab="expenses">Expenses</button>
    <button data-tab="savings">Savings</button>
    <button data-tab="summary">Summary</button>
  </nav>

  <!-- Screen: Income -->
  <div class="screen active" data-screen="income">
    <div class="field" data-field="monthly_income">
      <label>$ Monthly Income <span class="req">*</span></label>
      <input type="text" id="monthly_income" placeholder="5000.00">
    </div>
    <div class="field" data-field="income_type">
      <label>Income Type</label>
      <select id="income_type">
        <option value="">Select...</option>
        <option value="Salary">Salary</option>
        <option value="Freelance">Freelance</option>
        <option value="Business">Business</option>
        <option value="Mixed">Mixed</option>
      </select>
    </div>
    <div class="field" data-field="pay_frequency">
      <label>Pay Frequency</label>
      <select id="pay_frequency">
        <option value="">Select...</option>
        <option value="Weekly">Weekly</option>
        <option value="Bi-weekly">Bi-weekly</option>
        <option value="Monthly">Monthly</option>
      </select>
    </div>
    <div class="field" data-field="additional_income">
      <label>$ Additional Income</label>
      <input type="text" id="additional_income" placeholder="0.00">
    </div>
    <div class="actions">
      <button class="btn-primary" id="btn_next_income">Next Step</button>
      <button class="btn-secondary" id="btn_reset_income">Reset Budget</button>
    </div>
  </div>

  <!-- Screen: Expenses -->
  <div class="screen" data-screen="expenses">
    <div class="field-group">
      <h3>Fixed Expenses</h3>
      <div class="field" data-field="rent">
        <label>$ Rent / Mortgage</label>
        <input type="text" id="rent" placeholder="1500.00">
      </div>
      <div class="field" data-field="utilities">
        <label>$ Utilities</label>
        <input type="text" id="utilities" placeholder="200.00">
      </div>
      <div class="field" data-field="insurance">
        <label>$ Insurance</label>
        <input type="text" id="insurance" placeholder="300.00">
      </div>
      <div class="field" data-field="transportation">
        <label>$ Transportation</label>
        <input type="text" id="transportation" placeholder="150.00">
      </div>
      <div class="field" data-field="subscriptions">
        <label>$ Subscriptions</label>
        <input type="text" id="subscriptions" placeholder="50.00">
      </div>
      <div class="field" data-field="loan_payments">
        <label>$ Loan Payments</label>
        <input type="text" id="loan_payments" placeholder="0.00">
      </div>
      <div class="field" data-field="other_fixed">
        <label>$ Other Fixed</label>
        <input type="text" id="other_fixed" placeholder="0.00">
      </div>
    </div>
    <div class="field" data-field="fixed_total">
      <label>$ Fixed Total</label>
      <input type="text" id="fixed_total" readonly placeholder="0.00">
    </div>
    <div class="actions">
      <button class="btn-primary" id="btn_next_expenses">Next Step</button>
      <button class="btn-secondary" id="btn_back_expenses">Back</button>
    </div>
  </div>

  <!-- Screen: Savings -->
  <div class="screen" data-screen="savings">
    <div class="field" data-field="savings_rate">
      <label>Savings Rate (%)</label>
      <input type="number" id="savings_rate" min="0" max="100" placeholder="20">
    </div>
    <div class="field" data-field="monthly_savings">
      <label>$ Monthly Savings</label>
      <input type="text" id="monthly_savings" readonly placeholder="0.00">
    </div>
    <div class="field" data-field="emergency_fund_target">
      <label>$ Emergency Fund Target</label>
      <input type="text" id="emergency_fund_target" placeholder="15000.00">
    </div>

    <div class="field-group">
      <h3>Savings Goals</h3>
      <div class="field" data-field="goal_1_name">
        <label>Goal 1 Name</label>
        <input type="text" id="goal_1_name" placeholder="Vacation fund">
      </div>
      <div class="field" data-field="goal_1_amount">
        <label>$ Goal 1 Amount</label>
        <input type="text" id="goal_1_amount" placeholder="3000.00">
      </div>
      <div class="field" data-field="goal_2_name">
        <label>Goal 2 Name</label>
        <input type="text" id="goal_2_name" placeholder="New laptop">
      </div>
      <div class="field" data-field="goal_2_amount">
        <label>$ Goal 2 Amount</label>
        <input type="text" id="goal_2_amount" placeholder="1500.00">
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary" id="btn_next_savings">Next Step</button>
      <button class="btn-secondary" id="btn_back_savings">Back</button>
    </div>
  </div>

  <!-- Screen: Summary -->
  <div class="screen" data-screen="summary">
    <div class="field-group">
      <h3>Budget Overview</h3>
      <div class="field" data-field="total_income">
        <label>$ Total Income</label>
        <input type="text" id="total_income" readonly placeholder="0.00">
      </div>
      <div class="field" data-field="total_expenses">
        <label>$ Total Expenses</label>
        <input type="text" id="total_expenses" readonly placeholder="0.00">
      </div>
      <div class="field" data-field="total_savings">
        <label>$ Total Savings</label>
        <input type="text" id="total_savings" readonly placeholder="0.00">
      </div>
      <div class="field" data-field="remaining">
        <label>$ Remaining</label>
        <input type="text" id="remaining" readonly placeholder="0.00">
      </div>
      <div class="field" data-field="annual_savings">
        <label>$ Annual Savings</label>
        <input type="text" id="annual_savings" readonly placeholder="0.00">
      </div>
    </div>
    <div class="field" data-field="budget_status">
      <label>Budget Status</label>
      <input type="text" id="budget_status" readonly value="Not calculated">
    </div>
    <div class="field" data-field="recommendations">
      <label>Recommendations</label>
      <textarea id="recommendations" readonly placeholder="Penny's budget recommendations will appear here..." style="min-height:120px;"></textarea>
    </div>
    <div class="actions">
      <button class="btn-primary" id="btn_apply_budget">Apply Budget</button>
      <button class="btn-secondary" id="btn_back_summary">Back</button>
      <button class="btn-secondary" id="btn_reset_summary">Reset Budget</button>
      <button class="btn-secondary" id="btn_expense_breakdown">Expense Breakdown</button>
    </div>
  </div>
</div>

<!-- Modal: Expense Breakdown -->
<div class="modal-overlay" id="modal_expense_breakdown">
  <div class="modal">
    <h2>Expense Breakdown</h2>
    <div class="breakdown-content" id="breakdown_content">No expense data yet. Fill in your expenses to see the breakdown.</div>
    <button class="modal-close" onclick="closeModal('expense_breakdown')">Close</button>
  </div>
</div>

<div class="chat-panel">
  <div class="chat-header">
    Penny <span class="chat-status" id="status">connecting...</span>
  </div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input">
    <input type="text" id="chat-input" placeholder="Tell Penny about your finances..." autofocus>
    <button id="chat-send">Send</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WS_URL = "ws://localhost:__ACP_WS_PORT__/connect";
const statusEl = document.getElementById("status");
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("chat-input");
const toastEl = document.getElementById("toast");

let ws, streaming = "", busy = false, reconnectAttempts = 0;
const MAX_RECONNECT = 5;

function switchScreen(screenId) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".screen-tabs button").forEach(b => b.classList.remove("active"));
  const screen = document.querySelector(`.screen[data-screen="${screenId}"]`);
  const tab = document.querySelector(`.screen-tabs button[data-tab="${screenId}"]`);
  if (screen) screen.classList.add("active");
  if (tab) tab.classList.add("active");
}
document.querySelectorAll(".screen-tabs button").forEach(btn => {
  btn.addEventListener("click", () => switchScreen(btn.dataset.tab));
});

function openModal(id) {
  if (id === "expense_breakdown") {
    const fields = ["rent","utilities","insurance","transportation","subscriptions","loan_payments","other_fixed"];
    const labels = ["Rent/Mortgage","Utilities","Insurance","Transportation","Subscriptions","Loan Payments","Other Fixed"];
    let total = 0;
    const lines = fields.map((f, idx) => {
      const v = parseFloat(document.getElementById(f).value) || 0;
      total += v;
      const pct = total > 0 ? "" : "";
      return `${labels[idx].padEnd(20)} $${v.toFixed(2)}`;
    });
    // Recalc percentages with final total
    const breakdown = fields.map((f, idx) => {
      const v = parseFloat(document.getElementById(f).value) || 0;
      const pct = total > 0 ? ((v / total) * 100).toFixed(1) : "0.0";
      return `${labels[idx].padEnd(20)} $${v.toFixed(2).padStart(10)}  (${pct}%)`;
    }).join("\n");
    document.getElementById("breakdown_content").textContent =
      breakdown + `\n${"─".repeat(44)}\n${"Total".padEnd(20)} $${total.toFixed(2).padStart(10)}`;
  }
  document.getElementById("modal_" + id)?.classList.add("open");
}
function closeModal(id) { document.getElementById("modal_" + id)?.classList.remove("open"); }

function connect() {
  ws = new WebSocket(WS_URL);
  const _wsSend = ws.send.bind(ws);
  ws.send = (data) => { const m = JSON.parse(data); console.log("[ACP →]", m.type, m); _wsSend(data); };
  ws.onopen = () => { reconnectAttempts = 0; addSystemMsg("Connected to ACP server"); };
  ws.onclose = () => {
    statusEl.textContent = "disconnected";
    if (reconnectAttempts < MAX_RECONNECT) {
      const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
      reconnectAttempts++;
      addSystemMsg(`Disconnected. Reconnecting in ${delay/1000}s... (${reconnectAttempts}/${MAX_RECONNECT})`);
      setTimeout(connect, delay);
    } else { addSystemMsg("Connection lost. Reload the page to retry."); }
  };
  ws.onerror = () => {};
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
}

function sendManifest() {
  ws.send(JSON.stringify({
    type: "manifest",
    app: "budget-wizard",
    currentScreen: "income",
    persona: {
      name: "Penny",
      role: "personal budget planning advisor",
      instructions: "CRITICAL RULE: You MUST fill ALL 4 screens (income, expenses, savings, summary) in one go. DO NOT stop or say Done until the summary screen fields are filled.\n\nYou are Penny, a warm personal finance advisor.\n\nStep 1 — INCOME: set_field monthly_income (e.g. 6000), income_type, pay_frequency, additional_income (e.g. 500). Then click_action next_step.\nStep 2 — EXPENSES: set_field rent, utilities, insurance, transportation, subscriptions, loan_payments, other_fixed. set_field fixed_total (sum). Then click_action next_step.\nStep 3 — SAVINGS: set_field savings_rate (e.g. 20), monthly_savings (income*rate/100), emergency_fund_target, goal_1_name, goal_1_amount, goal_2_name, goal_2_amount. Then click_action next_step.\nStep 4 — SUMMARY: set_field total_income, total_expenses, total_savings, remaining (income-expenses-savings), annual_savings (monthly*12), budget_status (e.g. Healthy), recommendations (practical advice). Then show_toast success.\n\nYou are NOT done until Step 4 is complete."
    },
    screens: {
      income: {
        id: "income", label: "Income",
        fields: [
          { id: "monthly_income", type: "currency", label: "Monthly Income", required: true },
          { id: "income_type", type: "select", label: "Income Type", options: [
            { value: "Salary", label: "Salary" }, { value: "Freelance", label: "Freelance" },
            { value: "Business", label: "Business" }, { value: "Mixed", label: "Mixed" }
          ]},
          { id: "pay_frequency", type: "select", label: "Pay Frequency", options: [
            { value: "Weekly", label: "Weekly" }, { value: "Bi-weekly", label: "Bi-weekly" }, { value: "Monthly", label: "Monthly" }
          ]},
          { id: "additional_income", type: "currency", label: "Additional Income" }
        ],
        actions: [
          { id: "next_step", label: "Next Step" },
          { id: "reset_budget", label: "Reset Budget" }
        ]
      },
      expenses: {
        id: "expenses", label: "Expenses",
        fields: [
          { id: "rent", type: "currency", label: "Rent / Mortgage" },
          { id: "utilities", type: "currency", label: "Utilities" },
          { id: "insurance", type: "currency", label: "Insurance" },
          { id: "transportation", type: "currency", label: "Transportation" },
          { id: "subscriptions", type: "currency", label: "Subscriptions" },
          { id: "loan_payments", type: "currency", label: "Loan Payments" },
          { id: "other_fixed", type: "currency", label: "Other Fixed" },
          { id: "fixed_total", type: "currency", label: "Fixed Total", readOnly: true }
        ],
        actions: [
          { id: "next_step", label: "Next Step" },
          { id: "back", label: "Back" }
        ]
      },
      savings: {
        id: "savings", label: "Savings",
        fields: [
          { id: "savings_rate", type: "number", label: "Savings Rate (%)", min: 0, max: 100 },
          { id: "monthly_savings", type: "currency", label: "Monthly Savings", readOnly: true },
          { id: "emergency_fund_target", type: "currency", label: "Emergency Fund Target" },
          { id: "goal_1_name", type: "text", label: "Goal 1 Name" },
          { id: "goal_1_amount", type: "currency", label: "Goal 1 Amount" },
          { id: "goal_2_name", type: "text", label: "Goal 2 Name" },
          { id: "goal_2_amount", type: "currency", label: "Goal 2 Amount" }
        ],
        actions: [
          { id: "next_step", label: "Next Step" },
          { id: "back", label: "Back" }
        ]
      },
      summary: {
        id: "summary", label: "Summary",
        fields: [
          { id: "total_income", type: "currency", label: "Total Income", readOnly: true },
          { id: "total_expenses", type: "currency", label: "Total Expenses", readOnly: true },
          { id: "total_savings", type: "currency", label: "Total Savings", readOnly: true },
          { id: "remaining", type: "currency", label: "Remaining", readOnly: true },
          { id: "annual_savings", type: "currency", label: "Annual Savings", readOnly: true },
          { id: "budget_status", type: "text", label: "Budget Status", readOnly: true },
          { id: "recommendations", type: "textarea", label: "Recommendations", readOnly: true }
        ],
        actions: [
          { id: "apply_budget", label: "Apply Budget", requiresConfirmation: true },
          { id: "back", label: "Back" },
          { id: "reset_budget", label: "Reset Budget" }
        ],
        modals: [
          { id: "expense_breakdown", label: "Expense Breakdown" }
        ]
      }
    }
  }));
}

function handleMessage(msg) {
  if (msg.type === "command") {
    console.log("[ACP ←] command seq=" + msg.seq, msg.actions.map(a => `${a.do}(${a.field||a.screen||a.action||a.modal||""})${a.value!==undefined?"="+JSON.stringify(a.value):a.message?" msg="+JSON.stringify(a.message):""}`));
  } else {
    console.log("[ACP ←]", msg.type, msg.status || msg.message || "");
  }
  switch (msg.type) {
    case "config": sendManifest(); break;
    case "status":
      statusEl.textContent = msg.status;
      statusEl.className = "chat-status" + (msg.status === "thinking" || msg.status === "executing" ? " thinking" : "");
      busy = msg.status !== "idle";
      inputEl.disabled = busy;
      document.getElementById("chat-send").disabled = busy;
      if (!busy) inputEl.focus();
      break;
    case "chat":
      if (msg.delta) { if (!streaming) { streaming = ""; startStream(); } streaming += msg.message; updateStream(streaming); }
      else if (streamEl) { finalizeStream(); }
      else { addAgentMsg(msg.message); }
      break;
    case "command": executeCommand(msg); break;
    case "error": addSystemMsg("Error: " + msg.message); break;
  }
}

function executeCommand(msg) {
  const results = msg.actions.map((action, i) => {
    try {
      switch (action.do) {
        case "set_field": {
          const el = document.getElementById(action.field);
          if (!el) return { index: i, success: false, error: "Field not found: " + action.field };
          if (el.readOnly) { el.value = String(action.value); flash(el); }
          else {
            const tag = el.tagName.toLowerCase();
            const inputType = el.getAttribute("type") || "text";
            if (tag === "select" || ["number", "date", "datetime-local"].includes(inputType)) {
              el.value = String(action.value); flash(el);
            } else { typewriter(el, String(action.value)); }
          }
          el.scrollIntoView({ behavior: "smooth", block: "nearest" });
          return { index: i, success: true };
        }
        case "clear": {
          const el = document.getElementById(action.field);
          if (!el) return { index: i, success: false, error: "Field not found" };
          if (!el.readOnly) el.value = "";
          return { index: i, success: true };
        }
        case "click": {
          const cur = document.querySelector(".screen.active")?.dataset.screen;
          console.log("[CLICK]", action.action, "on screen:", cur);
          addSystemMsg("Action: " + action.action);
          if (action.action === "next_step") {
            const next = { income: "expenses", expenses: "savings", savings: "summary" }[cur];
            if (next) switchScreen(next);
          } else if (action.action === "back") {
            const prev = { expenses: "income", savings: "expenses", summary: "savings" }[cur];
            if (prev) switchScreen(prev);
          } else if (action.action === "reset_budget") {
            document.querySelectorAll(".form-panel input, .form-panel select, .form-panel textarea").forEach(el => {
              if (!el.readOnly) el.value = "";
            });
            ["fixed_total","monthly_savings","total_income","total_expenses","total_savings","remaining","annual_savings"].forEach(id => {
              document.getElementById(id).value = "";
            });
            document.getElementById("budget_status").value = "Not calculated";
            document.getElementById("recommendations").value = "";
            switchScreen("income");
          }
          return { index: i, success: true };
        }
        case "navigate": {
          console.log("[NAV]", document.querySelector(".screen.active")?.dataset.screen, "→", action.screen);
          switchScreen(action.screen);
          return { index: i, success: true };
        }
        case "show_toast": {
          showToast(action.message, action.level || "info");
          return { index: i, success: true };
        }
        case "ask_confirm": {
          const confirmed = window.confirm(action.message || "Are you sure?");
          ws.send(JSON.stringify({ type: "confirm", seq: msg.seq, confirmed }));
          return { index: i, success: true };
        }
        case "open_modal": {
          openModal(action.modal);
          return { index: i, success: true };
        }
        case "close_modal": {
          closeModal(action.modal);
          return { index: i, success: true };
        }
        default: return { index: i, success: true };
      }
    } catch (err) { return { index: i, success: false, error: err.message }; }
  });
  ws.send(JSON.stringify({ type: "result", seq: msg.seq, results }));
}

function typewriter(el, value) {
  el.value = ""; flash(el);
  let i = 0;
  const interval = setInterval(() => { el.value += value[i]; i++; if (i >= value.length) clearInterval(interval); }, 25);
}
function flash(el) {
  const field = el.closest(".field");
  if (field) { field.classList.add("highlight"); setTimeout(() => field.classList.remove("highlight"), 1500); }
}

function addAgentMsg(text) { addMsg(text, "agent"); }
function addUserMsg(text) { addMsg(text, "user"); }
function addSystemMsg(text) { addMsg(text, "system"); }
function addMsg(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls; div.textContent = text;
  messagesEl.appendChild(div); messagesEl.scrollTop = messagesEl.scrollHeight;
}

let streamEl = null;
function startStream() { streamEl = document.createElement("div"); streamEl.className = "msg agent"; messagesEl.appendChild(streamEl); }
function updateStream(text) { if (streamEl) { streamEl.textContent = text; messagesEl.scrollTop = messagesEl.scrollHeight; } }
function finalizeStream() { streaming = ""; streamEl = null; }

function showToast(msg, level) {
  toastEl.textContent = msg; toastEl.className = "toast " + level;
  toastEl.style.display = "block"; setTimeout(() => { toastEl.style.display = "none"; }, 3000);
}

function sendText() {
  const text = inputEl.value.trim();
  if (!text || !ws) return;
  addUserMsg(text);
  ws.send(JSON.stringify({ type: "text", message: text }));
  inputEl.value = "";
}

document.getElementById("chat-send").addEventListener("click", sendText);
inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter") sendText(); });

// --- Button handlers ---
document.getElementById("btn_next_income").addEventListener("click", () => switchScreen("expenses"));
document.getElementById("btn_reset_income").addEventListener("click", () => {
  document.querySelectorAll(".form-panel input, .form-panel select, .form-panel textarea").forEach(el => { if (!el.readOnly) el.value = ""; });
  ["fixed_total","monthly_savings","total_income","total_expenses","total_savings","remaining","annual_savings"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("budget_status").value = "Not calculated";
  document.getElementById("recommendations").value = "";
});
document.getElementById("btn_next_expenses").addEventListener("click", () => switchScreen("savings"));
document.getElementById("btn_back_expenses").addEventListener("click", () => switchScreen("income"));
document.getElementById("btn_next_savings").addEventListener("click", () => switchScreen("summary"));
document.getElementById("btn_back_savings").addEventListener("click", () => switchScreen("expenses"));
document.getElementById("btn_apply_budget").addEventListener("click", () => {
  if (window.confirm("Apply this budget plan?")) showToast("Budget applied!", "success");
});
document.getElementById("btn_back_summary").addEventListener("click", () => switchScreen("savings"));
document.getElementById("btn_reset_summary").addEventListener("click", () => {
  document.querySelectorAll(".form-panel input, .form-panel select, .form-panel textarea").forEach(el => { if (!el.readOnly) el.value = ""; });
  ["fixed_total","monthly_savings","total_income","total_expenses","total_savings","remaining","annual_savings"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("budget_status").value = "Not calculated";
  document.getElementById("recommendations").value = "";
  switchScreen("income");
});
document.getElementById("btn_expense_breakdown").addEventListener("click", () => openModal("expense_breakdown"));

connect();
